<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='dashboard.css') }}">
</head>
<body>

    <nav class="navbar">
        <div class="logo">FlaskPro</div>
        <a href="{{ url_for('dashboard') }}" class="logout-btn">Logout</a>
    </nav>

    <div class="dashboard-container">
        <h1>Welcome Back 👋</h1>
        <p>You are successfully logged in.</p>

        <div class="card-section">
            <div class="card">
                <h3>Profile</h3>
                <p>View and manage your account.</p>
            </div>

            <div class="card">
                <h3>Settings</h3>
                <p>Customize your preferences.</p>
            </div>

            <div class="card">
                <h3>Reports</h3>
                <p>Check your activity reports.</p>
            </div>
        </div>
    </div>

</body>
</html>
